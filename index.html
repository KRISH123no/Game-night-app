    .scanline-s1 {

    .scanline-full-s2 {

    .scanline-full-s3 {

    .sonar-circle {

      border-radius: 50%; pointer-events: none;
    }

    .cinematic-glitch { position: relative; display: inline-block; }
    .glitch-active, .game-row:hover .cinematic-glitch {
      animation: glitch-skew 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94) infinite both;
      text-shadow: 
        2px 0 0 rgba(255,0,0,0.7), 
        -2px 0 0 rgba(0,255,0,0.7),
        0 2px 0 rgba(0,0,255,0.7);
    }
    .glitch-active::before, .glitch-active::after,
    .game-row:hover .cinematic-glitch::before,
    .game-row:hover .cinematic-glitch::after {
      content: attr(data-text);
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      mix-blend-mode: screen;
      background: transparent;
      color: inherit;
    }
    .glitch-active::before,
    .game-row:hover .cinematic-glitch::before {
      color: #ff003c;
      left: 3px;
      animation: glitch-anim-1 0.4s infinite linear alternate-reverse;
      z-index: 1;
    }
    .glitch-active::after,
    .game-row:hover .cinematic-glitch::after {
      color: #00e6f6;
      left: -3px;
      animation: glitch-anim-2 0.3s infinite linear alternate-reverse;
      z-index: 2;
    }
    @keyframes glitch-anim-1 {
      0% { clip-path: inset(10% 0 60% 0); transform: translate(-2px, 1px) scale(1.01); }
      20% { clip-path: inset(80% 0 5% 0); transform: translate(3px, -2px) scale(1.02); }
      40% { clip-path: inset(30% 0 50% 0); transform: translate(1px, 2px) scale(1.0); }
      60% { clip-path: inset(50% 0 30% 0); transform: translate(-3px, -1px) scale(1.03); }
      80% { clip-path: inset(5% 0 80% 0); transform: translate(2px, 3px) scale(1.01); }
      100% { clip-path: inset(60% 0 20% 0); transform: translate(-2px, -3px) scale(1.0); }
    }
    @keyframes glitch-anim-2 {
      0% { clip-path: inset(20% 0 80% 0); transform: translate(2px, -1px) scale(1.01); }
      20% { clip-path: inset(50% 0 10% 0); transform: translate(-3px, 2px) scale(1.0); }
      40% { clip-path: inset(10% 0 90% 0); transform: translate(4px, 1px) scale(1.02); }
      60% { clip-path: inset(90% 0 2% 0); transform: translate(-1px, -2px) scale(1.0); }
      80% { clip-path: inset(40% 0 40% 0); transform: translate(2px, -3px) scale(1.03); }
      100% { clip-path: inset(70% 0 20% 0); transform: translate(-3px, 2px) scale(1.01); }
    }
    @keyframes glitch-skew {
      0% { transform: skew(0deg); }
      20% { transform: skew(-5deg); }
      40% { transform: skew(3deg); }
      60% { transform: skew(-2deg); }
      80% { transform: skew(1deg); }
      100% { transform: skew(0deg); }
    }

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const GAMES = [
      { id: 1, title: "WOULD YOU RATHER" },
      { id: 2, title: "ROAST BATTLE" },
      { id: 3, title: "TWO TRUTHS ONE LIE" },
      { id: 4, title: "CHAOS STORY", rounds: 6 },

      { id: 6, title: "NEVER HAVE I EVER" },
      { id: 7, title: "PERSONALITY ROAST" },
      { id: 8, title: "GUESS THE PERSON" },
      { id: 9, title: "WHO IN YOUR FRIEND GROUP" },
      { id: 10, title: "REALITY SHOW GENERATOR" }
    ];

    // Mode selection logic:
    // Skip mode modal entirely → straight to playerSetup
    const AI_ONLY_SKIP = [1, 5, 7, 8, 10];
    // Show "PLAY WITH AI" button only
    const AI_ONLY_SHOW = [9];
    // Show both "PLAY WITH AI" and "PLAY WITH FRIENDS"
    const BOTH_MODES = [2, 3, 4, 6];

    function cleanText(str) {
      return str
        .replace(/\*\*(.*?)\*\*/g, '$1')
        .replace(/\*(.*?)\*/g, '$1')
        .replace(/^Round\s*\d+\s*[-–—:]?\s*/i, '')
        .replace(/\*\*Round\s*\d+\*\*\s*[-–—:]?\s*/gi, '')
        .replace(/#{1,6}\s/g, '')
        .trim();
    }

    async function streamOpenRouter(promptText, history, systemPrompt, dynPrompt, onChunk) {
      const API_KEY = "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";
      const msgs = [{ role: "system", content: systemPrompt }, ...history];
      if (dynPrompt) msgs.push({ role: "system", content: dynPrompt });
      msgs.push({ role: "user", content: promptText });

      const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
        method: "POST",
        headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
        body: JSON.stringify({ model: "openai/gpt-oss-120b:free", messages: msgs, stream: true })
      });

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let fullText = "";

      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        const chunk = decoder.decode(value, { stream: true });
        const lines = chunk.split("\n");
        for (const line of lines) {
          if (line.startsWith("data: ") && line !== "data: [DONE]") {
            try {
              const data = JSON.parse(line.slice(6));
              if (data.choices && data.choices[0].delta && data.choices[0].delta.content) {
                const char = data.choices[0].delta.content;
                fullText += char;
                if (onChunk) onChunk(char, fullText);
              }
            } catch (e) {}
          }
        }
      }
      return fullText;
    }

    async function callAI(promptText, history, systemPrompt) {
      return streamOpenRouter(promptText, history || [], systemPrompt, null, () => {});
    }

    /* ═══════════════════════════════════════════════════════
       ORIGINAL SCREEN: HERO (unchanged)
    ═══════════════════════════════════════════════════════ */
    function Hero({ onStart }) {
       const [isGlitching, setIsGlitching] = useState(false);

       const handleStartClick = () => {
           if (isGlitching) return;
           setIsGlitching(true);
           setTimeout(() => {
               setIsGlitching(false);
               onStart();
           }, 600);
       };

       useEffect(() => {
           if (!isGlitching) return;
           const overlay = document.createElement('div');
           overlay.style.position = 'fixed';
           overlay.style.top = '0';
           overlay.style.left = '0';
           overlay.style.width = '100vw';
           overlay.style.height = '100vh';
           overlay.style.zIndex = '9999';
           overlay.style.pointerEvents = 'none';
           document.body.appendChild(overlay);

           const interval = setInterval(() => {
               const colors = ['black', 'white', '#FF0000', '#00FF00', '#0000FF', '#FFFF00', '#FF00FF'];
               overlay.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
               overlay.style.opacity = (Math.random() * 0.7 + 0.3).toString();

               overlay.innerHTML = '';

               const numStrips = Math.floor(Math.random() * 5) + 6;
               for (let i = 0; i < numStrips; i++) {
                   const strip = document.createElement('div');
                   strip.style.position = 'absolute';
                   strip.style.top = '0';
                   strip.style.left = '0';
                   strip.style.width = '100%';
                   strip.style.height = '100%';
                   strip.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                   strip.style.mixBlendMode = 'screen';
                   
                   const topOrig = Math.random() * 100;
                   const top = Math.min(topOrig, 90);
                   const bottom = Math.max(0, 100 - top - Math.max(5, Math.random() * 20));
                   strip.style.clipPath = `inset(${top}% 0 ${bottom}% 0)`;
                   strip.style.transform = `translateX(${Math.random() * 60 - 30}px)`;
                   
                   overlay.appendChild(strip);
               }

               const lines = Math.floor(Math.random() * 10);
               for (let i = 0; i < lines; i++) {
                   const line = document.createElement('div');
                   line.style.position = 'absolute';
                   line.style.left = '0';
                   line.style.width = '100%';
                   line.style.height = Math.random() > 0.5 ? '1px' : '2px';
                   line.style.top = Math.random() * 100 + '%';
                   line.style.backgroundColor = Math.random() > 0.5 ? 'white' : 'red';
                   overlay.appendChild(line);
               }

               const text = document.createElement('div');
               text.style.position = 'absolute';
               text.style.top = '50%';
               text.style.left = '50%';
               text.style.transform = 'translate(-50%, -50%)';
               text.style.fontFamily = 'monospace';
               text.style.fontSize = '8vw';
               text.style.lineHeight = '1.2';
               text.style.color = '#00fd00';
               text.style.fontWeight = 'bold';
               text.style.textShadow = '0 0 20px #00fd00';
               text.style.whiteSpace = 'pre-wrap';
               text.style.textAlign = 'center';
               text.innerText = Math.random() > 0.5 ? '01010110\nERROR\nSYSTEM BREACH' : 'ACCESS GRANTED\nOVERRIDE';
               overlay.appendChild(text);
           }, 30);

           return () => {
               clearInterval(interval);
               if(overlay.parentNode) overlay.parentNode.removeChild(overlay);
           };
       }, [isGlitching]);

       return (
        <main className="relative h-screen w-full flex flex-col items-center justify-center bg-surface-container-lowest font-s1-body text-on-background overflow-hidden selection:bg-green-hero selection:text-surface">
          <div className="absolute inset-0 pointer-events-none overflow-hidden">
            <div className="scanline-s1 top-[20%]"></div>
            <div className="scanline-s1 top-[45%] opacity-20"></div>
            <div className="scanline-s1 top-[75%]"></div>
            <div className="absolute top-24 left-24 w-4 h-4 border-t border-l border-cyan-hero/30"></div>
            <div className="absolute top-24 right-40 w-4 h-4 border-t border-r border-cyan-hero/30"></div>
            <div className="absolute bottom-24 left-24 w-4 h-4 border-b border-l border-cyan-hero/30"></div>
            <div className="absolute bottom-24 right-40 w-4 h-4 border-b border-r border-cyan-hero/30"></div>
          </div>

          <div className="fixed top-[52px] left-6 z-50 mix-blend-difference">
            <p className="font-mono text-[10px] uppercase tracking-[0.2em] text-cyan-hero">Status: Connected//Null</p>
            <p className="font-mono text-[10px] uppercase tracking-[0.2em] text-white/40">Lat: 35.6762 / Long: 139.6503</p>
          </div>
          <div className="fixed bottom-6 left-6 z-50">
            <div className="flex gap-4">
              <span className="w-1 h-1 bg-green-hero rounded-full"></span>
              <span className="w-1 h-1 bg-white/20 rounded-full"></span>
              <span className="w-1 h-1 bg-white/20 rounded-full"></span>
            </div>
          </div>

          <header className="fixed top-[28px] right-0 p-6 flex justify-end items-center w-full z-50 pointer-events-none">
            <div className="flex items-center gap-8 pointer-events-auto">
              <div className="font-mono text-sm tracking-tighter text-[#c1fffe]">NEURAL_VOID</div>
              <div className="flex items-center gap-4">
                <span className="font-s1-headline uppercase tracking-[0.2em] font-bold text-[#00fd00] text-xs">00:00:00</span>
              </div>
            </div>
          </header>

          <div className="relative z-10 text-center select-none px-12">
            <h1 className="font-s1-headline font-bold text-[12vw] leading-[0.85] tracking-[-0.05em] uppercase italic glitch-text-s1 mix-blend-screen">
              GAME<br/>NIGHT<br/>AI
            </h1>
            <div className="mt-8 flex justify-center gap-12">
              <p className="font-mono text-[10px] text-white/30 tracking-[0.3em] uppercase">V.04.2-STABLE</p>
              <p className="font-mono text-[10px] text-white/30 tracking-[0.3em] uppercase">CORE//NEURAL</p>

          <div className="absolute bottom-24 left-1/2 -translate-x-1/2 group">

    /* ═══════════════════════════════════════════════════════
       ORIGINAL SCREEN: GAME SELECT (original UI, updated routing)

    function GameSelect({ onSelectGame }) {
      const [modalGameId, setModalGameId] = useState(null);
      const [isTitleGlitching, setIsTitleGlitching] = useState(false);

      const handleModalTitleHover = () => {
          if (isTitleGlitching) return;
          setIsTitleGlitching(true);
          setTimeout(() => setIsTitleGlitching(false), 600);
      };

      const getSizeClass = (i) => {
         if (i < 3) return "text-4xl";
         if (i < 7) return "text-3xl";
         return "text-2xl";
      };

      const handleGameClick = (gameId) => {

          return;

        setModalGameId(gameId);

          <div className="sonar-circle w-[400px] h-[400px]"></div>

          <nav className="bg-surface text-gold-select font-s2-headline tracking-tighter uppercase text-xs border-b border-outline-variant/20 flex justify-between items-center px-6 py-2 w-full fixed top-[28px] z-50">
            <div className="flex items-center gap-6">
              <span className="font-michroma text-lg tracking-[0.2em] text-gold-select">NEURAL_LINK</span>

    function Gameplay({ gameId, playerName, history, setHistory, roundNumber, setRound, gameConfig, onFinish, onLobby, onPlayAgain }) {
      const [input, setInput] = useState("");
      const [isStreaming, setIsStreaming] = useState(history.length === 0);
      const [displayedMessage, setDisplayedMessage] = useState(history.length === 0 ? "INITIALIZING SECURE CHANNEL..." : "");
      const [showExitConfirm, setShowExitConfirm] = useState(false);
      const [inputPlaceholder, setInputPlaceholder] = useState("TYPE YOUR RESPONSE...");

      const targetTextRef = useRef("");
      const isTypingRef = useRef(false);

      const getDynamicPrompt = (round, maxRounds) => {
         return `CRITICAL INSTRUCTION: You are on round ${round} of ${maxRounds} ONLY.
Generate content for THIS round ONLY.
Do NOT generate content for any future rounds.
Stop completely after finishing round ${round} content.
Wait for the player's response.`;
      };

      const typeText = () => {
         setDisplayedMessage(prev => {
             if (prev.length < targetTextRef.current.length) {
                 setTimeout(typeText, 15);
                 return targetTextRef.current.substring(0, prev.length + 1);
             } else {
                 isTypingRef.current = false;
                 return prev;
             }
         });
      };

      const handleChunk = (chunk, fullText) => {
         const cleaned = cleanText(fullText);
         targetTextRef.current = cleaned;
         if (!isTypingRef.current) {
            isTypingRef.current = true;
            typeText();
         }
      };

      useEffect(() => {
         let active = true;
         const init = async () => {
            setIsStreaming(true);
            setDisplayedMessage("");
            const rounds = gameConfig?.rounds || 5;
            const dynPrompt = getDynamicPrompt(roundNumber, rounds);
            const res = await streamOpenRouter(`My name is ${playerName}. Start the game now.`, [], gameConfig?.systemPrompt || "You are a game host.", dynPrompt, handleChunk);
            if(active) {
               setHistory([{role: "assistant", content: cleanText(res)}]);
               setIsStreaming(false);
            }
         };
         if (history.length === 0) init();
         return () => active = false;
      }, []);

      const handleSubmit = async (e) => {
         if (e.key === 'Enter' && input.trim() && !isStreaming) {
            const userMsg = input.trim();
            setInput("");
            setIsStreaming(true);
            setDisplayedMessage("");
            
            const currentHist = [...history, {role: "user", content: userMsg}];
            const rounds = gameConfig?.rounds || 5;
            const nextRound = roundNumber + 1;
            
            if (nextRound > rounds) {
               setDisplayedMessage("CALCULATING VERDICT...");
               const finalPrompt = "The game is over. Give the final verdict and score as requested in the system prompt.";
               const finalRes = await streamOpenRouter(finalPrompt, currentHist, gameConfig?.systemPrompt || "", null, () => {});
               
               const scoreMatch = finalRes.match(/(\d{1,3})\s*(?:\/\s*100|%|out of 100)/i);
               const scoreStr = scoreMatch ? String(parseInt(scoreMatch[1])) : "50";
               const verdictMatch = finalRes.match(/verdict[:\s]+([A-Z\s\-]{3,30})/i);
               const verdict = verdictMatch ? verdictMatch[1].trim().toUpperCase() : 'SYSTEM OVERRIDE';
               const summary = cleanText(finalRes);

               setTimeout(() => onFinish(verdict, scoreStr, summary), 2000);
            } else {
               setRound(nextRound);
               const dynPrompt = getDynamicPrompt(nextRound, rounds);
               const aiResponse = await streamOpenRouter(userMsg, history, gameConfig?.systemPrompt || "", dynPrompt, handleChunk);
               currentHist.push({role: "assistant", content: cleanText(aiResponse)});
               setHistory(currentHist);
               setIsStreaming(false);
            }
         }
      };

      const [clock, setClock] = useState("00:00:00");
      useEffect(() => {
         const timer = setInterval(() => {
            const now = new Date();
            setClock(String(now.getHours()).padStart(2,'0') + ':' + 
                     String(now.getMinutes()).padStart(2,'0') + ':' + 
                     String(now.getSeconds()).padStart(2,'0'));
         }, 1000);
         return () => clearInterval(timer);
      }, []);

      const rounds = gameConfig?.rounds || 5;
      const deceptionIndex = Math.min(100, Math.floor((roundNumber / rounds) * 100));

      return (

          <header className="fixed top-[28px] left-0 w-full z-40 bg-[#131313] border-b border-outline-variant/20 flex justify-center items-center px-6 py-2">

      const gameConfig = GAMES.find(g => g.id === gameId);

      const minPlayers = MIN_2_PLAYERS.includes(gameId) ? 2 : 1;

      const addPlayer = () => {
        if (!nameInput.trim()) return;
        setPlayers(prev => [...prev, { name: nameInput.trim().toUpperCase(), personality: personalityInput.trim() || '', score: 0, status: 'ACTIVE' }]);
        setNameInput(''); setPersonalityInput('');
      };
      const removePlayer = (idx) => setPlayers(prev => prev.filter((_,i) => i !== idx));
      const handleKeyDown = (e) => { if (e.key === 'Enter') addPlayer(); };

      const handleAddWildcard = async () => {
        const res = await callAI("Generate a wildcard reality show cast member. Format: NAME: [name] PERSONALITY: [description]", [], "You generate fictional reality show characters.");
        const nm = res.match(/NAME:\s*(.+)/i); const ps = res.match(/PERSONALITY:\s*(.+)/i);
        setPlayers(prev => [...prev, { name: (nm ? nm[1].trim().toUpperCase() : 'WILDCARD_' + (prev.length+1)), personality: (ps ? ps[1].trim() : 'CHAOTIC'), score: 0, status: 'ACTIVE', isWildcard: true }]);
      };

      const handleInitiate = () => { gameId === 10 ? setSetupPhase('theme') : onStart(players, {}); };
      const handleThemeSelect = (t) => { setSelectedTheme(t); setSetupPhase('episodes'); };
      const handleEpisodeSelect = (c) => { onStart(players, { theme: selectedTheme, episodes: c }); };

      if (setupPhase === 'theme') {
        const themes = [{id:'SINGLES_INFERNO',label:'SINGLES INFERNO',desc:'Korean dating drama'},{id:'SCI_FI_DARK',label:'SCI-FI DARK',desc:'Dark sci-fi serial'},{id:'MYSTERY_MURDER',label:'MYSTERY MURDER',desc:'Victorian murder mystery'},{id:'SURVIVAL',label:'SURVIVAL',desc:'Survivor-style elimination'}];
        return (<main className="relative h-screen w-full bg-black text-white overflow-hidden flex flex-col items-center justify-center" style={{cursor:'crosshair'}}><SigintOverlays/><SigintHeader/>
          <h1 className="michroma text-4xl sigint-glitch tracking-widest mb-4 uppercase">THEME_SELECTION</h1>
          <p className="font-mono text-[10px] text-white/40 tracking-widest mb-12 uppercase">SELECT SIMULATION PROTOCOL</p>
          <div className="grid grid-cols-2 gap-6 max-w-3xl w-full px-8">{themes.map(t=>(<button key={t.id} onClick={()=>handleThemeSelect(t.id)} className="border border-white/20 bg-black p-8 text-left hover:border-[#C9A84C] hover:bg-white/5 transition-all group"><h3 className="michroma text-xl text-[#C9A84C] tracking-widest mb-2">{t.label}</h3><p className="text-[10px] text-white/40 font-mono tracking-widest uppercase">{t.desc}</p></button>))}</div>
          <button onClick={()=>setSetupPhase('players')} className="mt-8 text-xs font-mono text-white/30 hover:text-white/60 transition-colors tracking-widest uppercase">&#60; BACK</button>
        </main>);
      }
      if (setupPhase === 'episodes') {
        return (<main className="relative h-screen w-full bg-black text-white overflow-hidden flex flex-col items-center justify-center" style={{cursor:'crosshair'}}><SigintOverlays/><SigintHeader/>
          <h1 className="michroma text-4xl sigint-glitch tracking-widest mb-4 uppercase">HOW MANY EPISODES</h1>
          <div className="flex gap-6 mb-8">{[3,5,8].map(n=>(<button key={n} onClick={()=>handleEpisodeSelect(n)} className="w-24 h-24 border border-white/20 bg-black flex items-center justify-center hover:border-[#C9A84C] transition-all"><span className="michroma text-3xl text-[#C9A84C]">{n}</span></button>))}</div>
          <div className="flex items-center gap-4"><input type="number" min="1" max="20" value={customEpisodes} onChange={e=>setCustomEpisodes(e.target.value)} className="w-24 bg-transparent border border-white/20 px-4 py-3 michroma text-xl text-center text-[#C9A84C] focus:ring-0 outline-none" placeholder="?"/><button onClick={()=>{if(customEpisodes&&parseInt(customEpisodes)>0)handleEpisodeSelect(parseInt(customEpisodes));}} className="border border-[#C9A84C] px-6 py-3 michroma text-xs text-[#C9A84C] hover:bg-[#C9A84C] hover:text-black transition-all tracking-widest">CUSTOM</button></div>
          <button onClick={()=>setSetupPhase('theme')} className="mt-8 text-xs font-mono text-white/30 hover:text-white/60 transition-colors tracking-widest uppercase">&#60; BACK</button>
        </main>);
      }

      return (
        <main className="relative h-screen w-full bg-black text-white overflow-hidden" style={{cursor:'crosshair'}}>
          <SigintOverlays/><SigintHeader/>
          <div className="relative flex h-screen w-full z-10 pt-[52px]">
            <aside className="w-[260px] h-full bg-black border-r border-white/10 flex flex-col p-6 gap-y-12">
              <header><h1 className="michroma text-2xl leading-none tracking-tight sigint-glitch mb-2">GAME<br/>NIGHT AI</h1><div className="h-[1px] w-full bg-gradient-to-r from-[#FF003C] via-[#00E5FF] to-transparent opacity-50"></div></header>
              <section className="flex-1 sigint-scroll overflow-y-auto">
                <div className="flex items-center justify-between mb-4"><h2 className="text-[10px] tracking-[0.2em] font-bold text-neutral-500 uppercase">Deployed_Entities</h2><span className="text-[10px] text-white/40">[{String(players.length).padStart(2,'0')}/08]</span></div>
                <div className="space-y-4">
                  {players.map((p,i)=>(<div key={i} className="flex items-center gap-3 group cursor-pointer" onClick={()=>removePlayer(i)}><span className="text-[#C9A84C] font-bold text-xs">&gt;</span><div className="flex flex-col flex-1"><span className="michroma text-xs tracking-wider uppercase">{p.name}</span>{p.personality&&<span className="text-[9px] text-neutral-500 font-mono tracking-tighter">PROFILE: {p.personality}</span>}{p.isWildcard&&<span className="text-[9px] text-[#FF003C] font-mono">WILDCARD</span>}</div><span className="text-[10px] text-red-500/0 group-hover:text-red-500/80 transition-all">✕</span></div>))}
                  {players.length===0&&(<div className="flex items-center gap-3 opacity-60"><span className="text-neutral-600 text-xs">[ ]</span><div className="flex flex-col"><span className="michroma text-xs tracking-wider uppercase text-neutral-400">AWAITING_INPUT</span></div></div>)}
                </div>
              </section>
              <button onClick={onBack} className="text-[10px] font-mono text-white/30 hover:text-white/60 transition-colors tracking-widest uppercase text-left">&lt; ABORT_SETUP</button>
            </aside>
            <div className="flex-1 relative flex flex-col items-center justify-center p-20">
              <div className="w-full max-w-2xl space-y-12">
                <div className="mb-2"><span className="michroma text-[10px] tracking-[0.5em] text-[#C9A84C]/60 uppercase">{gameConfig?.title} // PLAYER_SETUP</span></div>
                <div className="space-y-2">
                  <label className="text-[10px] michroma tracking-[0.4em] text-white/40 block ml-1 uppercase">{showPersonality ? 'Operative_Name' : 'Enter_Player_Name'}</label>
                  <input autoFocus className="w-full bg-transparent border border-white/40 px-6 py-5 michroma text-xl tracking-widest focus:ring-0 focus:border-white transition-colors placeholder:text-white/10 uppercase outline-none" placeholder="ENTER NAME_" type="text" value={nameInput} onChange={e=>setNameInput(e.target.value)} onKeyDown={handleKeyDown}/>
                </div>
                {showPersonality&&(<div className="space-y-2"><label className="text-[10px] michroma tracking-[0.4em] text-white/40 block ml-1 uppercase">Personality_Matrix</label><textarea className="w-full bg-transparent border border-white/20 px-6 py-4 text-sm tracking-widest focus:ring-0 focus:border-white/60 transition-colors placeholder:text-white/10 resize-none uppercase outline-none" placeholder="DESCRIBE BEHAVIORAL PROTOCOL..." rows="3" value={personalityInput} onChange={e=>setPersonalityInput(e.target.value)}></textarea></div>)}
                <div className="flex gap-4">
                  <button onClick={addPlayer} className="group relative px-10 py-3 border border-[#C9A84C] overflow-hidden"><div className="absolute inset-0 bg-[#C9A84C] translate-y-full group-hover:translate-y-0 transition-transform duration-200"></div><span className="relative z-10 michroma text-xs tracking-[0.3em] text-[#C9A84C] group-hover:text-black transition-colors uppercase">ADD_PLAYER</span></button>
                  {gameId===10&&(<button onClick={handleAddWildcard} className="group relative px-10 py-3 border border-[#FF003C] overflow-hidden"><div className="absolute inset-0 bg-[#FF003C] translate-y-full group-hover:translate-y-0 transition-transform duration-200"></div><span className="relative z-10 michroma text-xs tracking-[0.3em] text-[#FF003C] group-hover:text-black transition-colors uppercase">ADD_WILDCARD</span></button>)}
                </div>
              </div>
            </div>
          </div>
          {players.length>=minPlayers&&(<div className="fixed bottom-12 right-12 z-[55]"><button onClick={handleInitiate} className="group relative flex items-center gap-6"><div className="text-right flex flex-col"><span className="michroma text-[10px] tracking-[0.5em] text-[#C9A84C] opacity-50 group-hover:opacity-100 transition-opacity uppercase">System_Ready</span><span className="text-[9px] font-mono text-neutral-500 uppercase">{players.length} Operator(s) Deployed</span></div><div className="relative p-6 border border-[#C9A84C] group-hover:bg-[#C9A84C] transition-all"><span className="michroma text-xl tracking-[0.2em] text-[#C9A84C] group-hover:text-black transition-colors uppercase">INITIATE_PROTOCOL</span><div className="absolute -top-[2px] -left-[2px] w-2 h-2 border-t-2 border-l-2 border-[#C9A84C]"></div><div className="absolute -bottom-[2px] -right-[2px] w-2 h-2 border-b-2 border-r-2 border-[#C9A84C]"></div></div></button></div>)}
        </main>
      );
    }

    /* ═══════════════════════════════════════════════════════
       GAME 1 — WOULD YOU RATHER (AI only, 10 questions)
    ═══════════════════════════════════════════════════════ */
    function WouldYouRatherGame({ players, onFinish, onLobby }) {
      const [qNum, setQNum] = useState(1);
      const [question, setQuestion] = useState('');
      const [optionA, setOptionA] = useState('');
      const [optionB, setOptionB] = useState('');
      const [phase, setPhase] = useState('loading');
      const [votes, setVotes] = useState({});
      const [voterIdx, setVoterIdx] = useState(0);
      const [reaction, setReaction] = useState('');
      const [scores, setScores] = useState({});
      const [history, setHistory] = useState([]);
      const totalQ = 10;
      const sysPrompt = "You are a chaotic game show host. Generate one extremely creative Would You Rather dilemma. Format EXACTLY as: QUESTION: [question text] OPTION_A: [option a text] OPTION_B: [option b text]. Make it progressively more unhinged. Round 1-3: mildly awkward. Round 4-6: genuinely difficult and spicy. Round 7-9: unhinged. Round 10: absolutely chaotic.";

      const loadQ = async (round) => {
        setPhase('loading'); setReaction('');
        const names = players.map(p=>p.name).join(', ');
        const res = await callAI(`Generate a Would You Rather question for round ${round} of ${totalQ}. Players: ${names}. Escalate intensity.`, history, sysPrompt);
        const qM = res.match(/QUESTION:\s*(.+?)(?=OPTION_A:|$)/is);
        const aM = res.match(/OPTION_A:\s*(.+?)(?=OPTION_B:|$)/is);
        const bM = res.match(/OPTION_B:\s*(.+)/is);
        setQuestion(qM ? qM[1].trim() : 'Would you rather have unlimited power or unlimited knowledge?');
        setOptionA(aM ? aM[1].trim() : 'Option A');
        setOptionB(bM ? bM[1].trim() : 'Option B');
        setVotes({}); setVoterIdx(0);
        setHistory(prev=>[...prev,{role:'assistant',content:res}]);
        setPhase('voting');
      };
      useEffect(()=>{loadQ(1);},[]);

      const handleVote = async (choice) => {
        const voter = players[voterIdx];
        const nv = {...votes,[voter.name]:choice};
        setVotes(nv);
        if (voterIdx < players.length - 1) { setVoterIdx(prev=>prev+1); return; }
        setPhase('results');
        const vSummary = Object.entries(nv).map(([n,v])=>`${n} chose ${v}`).join(', ');
        const r = await callAI(`Players voted: ${vSummary}. React savagely in 2 sentences.`, history, "You are a savage game show host reacting to player choices.");
        setReaction(cleanText(r));
        const ns = {...scores};
        Object.entries(nv).forEach(([n])=>{ns[n]=(ns[n]||0)+Math.floor(Math.random()*20)+10;});
        setScores(ns);
      };

      const nextQ = () => { const n=qNum+1; setQNum(n); loadQ(n); };
      const finish = async () => {
        const allChoices = Object.entries(scores).map(([n,s])=>`${n}: ${s} points`).join(', ');
        const verdict = await callAI(`The game is over. Players and scores: ${allChoices}. Give a final group personality verdict based on their answers. Be savage.`, history, "You are a chaotic game show host giving final verdicts.");
        const fp = players.map(p=>({...p,score:String(scores[p.name]||50)}));
        onFinish(fp, 'WOULD YOU RATHER');
      };

      const totalV = Object.keys(votes).length;
      const aV = Object.values(votes).filter(v=>v==='A').length;
      const bV = Object.values(votes).filter(v=>v==='B').length;
      const aP = totalV ? Math.round((aV/totalV)*100) : 0;
      const bP = totalV ? Math.round((bV/totalV)*100) : 0;

      return (
        <main className="bg-black text-white h-screen w-screen relative overflow-hidden flex flex-col" style={{cursor:'crosshair'}}>
          <SigintOverlays/><SigintHeader onExit={onLobby}/>
          <div className="flex-1 flex flex-col items-center justify-center px-8 pt-[76px] pb-8 relative z-10">
            <div className="mb-4 font-mono text-xs text-[#00E5FF]/50 uppercase tracking-widest">QUESTION {qNum} / {totalQ}</div>
            {phase==='loading'&&<div className="michroma text-2xl text-[#C9A84C] animate-pulse tracking-widest">GENERATING DILEMMA...</div>}
            {phase==='voting'&&(<>
              <h1 className="michroma text-3xl md:text-4xl text-center sigint-glitch text-white tracking-wide mb-12 max-w-4xl leading-relaxed">{question}</h1>
              {players.length>1&&<div className="mb-6 michroma text-sm text-[#C9A84C] tracking-widest">{players[voterIdx]?.name}'S TURN</div>}
              <div className="grid grid-cols-2 gap-6 w-full max-w-4xl">
                <button onClick={()=>handleVote('A')} className="border border-white/20 bg-black p-8 text-center hover:border-[#FF003C] hover:bg-[#FF003C]/10 transition-all min-h-[200px] flex flex-col items-center justify-center"><div className="michroma text-[10px] text-[#FF003C] tracking-widest mb-4">OPTION_A</div><p className="text-lg text-white leading-relaxed">{optionA}</p></button>
                <button onClick={()=>handleVote('B')} className="border border-white/20 bg-black p-8 text-center hover:border-[#00E5FF] hover:bg-[#00E5FF]/10 transition-all min-h-[200px] flex flex-col items-center justify-center"><div className="michroma text-[10px] text-[#00E5FF] tracking-widest mb-4">OPTION_B</div><p className="text-lg text-white leading-relaxed">{optionB}</p></button>
              </div>
            </>)}
            {phase==='results'&&(<div className="text-center max-w-3xl">
              <h2 className="michroma text-2xl sigint-glitch mb-8 tracking-widest">RESULTS</h2>
              <div className="flex w-full h-12 mb-6 overflow-hidden border border-white/20"><div className="bg-[#FF003C]/30 flex items-center justify-center transition-all duration-1000" style={{width:`${aP}%`}}><span className="michroma text-sm text-white">{aP}% A</span></div><div className="bg-[#00E5FF]/30 flex items-center justify-center transition-all duration-1000" style={{width:`${bP}%`}}><span className="michroma text-sm text-white">{bP}% B</span></div></div>
              <div className="flex flex-wrap gap-4 justify-center mb-8">{Object.entries(votes).map(([n,c])=>(<div key={n} className={`px-4 py-2 border ${c==='A'?'border-[#FF003C] text-[#FF003C]':'border-[#00E5FF] text-[#00E5FF]'} text-xs michroma tracking-widest`}>{n}: {c}</div>))}</div>
              {reaction&&<p className="text-lg text-white/80 leading-relaxed mb-8">{reaction}</p>}
              {qNum<totalQ ? <button onClick={nextQ} className="border border-[#C9A84C] px-8 py-3 michroma text-xs text-[#C9A84C] hover:bg-[#C9A84C] hover:text-black transition-all tracking-widest uppercase">NEXT QUESTION</button> : <button onClick={finish} className="border border-[#C9A84C] px-12 py-4 michroma text-sm text-[#C9A84C] hover:bg-[#C9A84C] hover:text-black transition-all tracking-widest uppercase">VIEW LEADERBOARD</button>}
            </div>)}
          </div>
        </main>
      );
    }

    /* ═══════════════════════════════════════════════════════
       GAME 2 — ROAST BATTLE (Text-based, 3 rounds, AI judge)
    ═══════════════════════════════════════════════════════ */
    function RoastBattleGame({ players, onFinish, onLobby }) {
      const [playerA, setPlayerA] = useState(null);
      const [playerB, setPlayerB] = useState(null);
      const [phase, setPhase] = useState('init'); // init, a_turn, b_turn, judging, result, finished
      const [roundNum, setRoundNum] = useState(1);
      const [input, setInput] = useState('');
      const [transcript, setTranscript] = useState([]);
      const [ammoText, setAmmoText] = useState('');
      const [showAmmo, setShowAmmo] = useState(false);
      const [judgeResult, setJudgeResult] = useState(null);
      const [remaining, setRemaining] = useState([]);
      const [winner, setWinner] = useState(null);
      const [allScores, setAllScores] = useState({});
      const [allVerdicts, setAllVerdicts] = useState({});
      const [battled, setBattled] = useState(new Set());
      const totalRounds = 3;

      useEffect(() => {
        if (players.length >= 2) {
          const shuffled = [...players].sort(() => Math.random() - 0.5);
          setPlayerA(shuffled[0]); setPlayerB(shuffled[1]);
          setRemaining(shuffled.slice(2));
          setBattled(new Set([shuffled[0].name, shuffled[1].name]));
          setPhase('a_turn');
        }
      }, []);

      const handleSubmit = async (e) => {
        if (e.key !== 'Enter' || !input.trim()) return;
        const msg = input.trim(); setInput('');
        const attacker = phase === 'a_turn' ? playerA?.name : playerB?.name;
        const newT = [...transcript, { from: attacker, text: msg }];
        setTranscript(newT);

        if (phase === 'a_turn') { setPhase('b_turn'); }
        else if (phase === 'b_turn') {
          if (roundNum < totalRounds) { setRoundNum(prev => prev + 1); setPhase('a_turn'); }
          else { judgeRoastBattle(newT); }
        }
      };

      const judgeRoastBattle = async (t) => {
        setPhase('judging');
        const tStr = t.map(m => `${m.from}: "${m.text}"`).join('\n');
        const prompt = `You are a brutal roast battle judge. Here is the full roast battle transcript between ${playerA?.name} and ${playerB?.name}:\n${tStr}\nJudge who won based on: creativity, savagery, humor, and comebacks. Give each player a score out of 10. Declare a winner. Give a one-line brutal verdict for each player. Format: WINNER: [name] PLAYER_A_SCORE: [score]/10 PLAYER_B_SCORE: [score]/10 PLAYER_A_VERDICT: [verdict] PLAYER_B_VERDICT: [verdict] SUMMARY: [2 sentence summary]`;
        const res = await callAI(prompt, [], "You are a roast battle judge. Be brutally honest.");
        const winnerMatch = res.match(/WINNER:\s*(.+?)(?=PLAYER_A_SCORE:|$)/is);
        const aScoreMatch = res.match(/PLAYER_A_SCORE:\s*(\d+)/i);
        const bScoreMatch = res.match(/PLAYER_B_SCORE:\s*(\d+)/i);
        const aVerdictMatch = res.match(/PLAYER_A_VERDICT:\s*(.+?)(?=PLAYER_B_VERDICT:|$)/is);
        const bVerdictMatch = res.match(/PLAYER_B_VERDICT:\s*(.+?)(?=SUMMARY:|$)/is);
        const summaryMatch = res.match(/SUMMARY:\s*(.+)/is);

        const aScore = aScoreMatch ? parseInt(aScoreMatch[1]) : 5;
        const bScore = bScoreMatch ? parseInt(bScoreMatch[1]) : 5;
        const w = aScore >= bScore ? playerA : playerB;
        setWinner(w);

        const ns = { ...allScores };
        ns[playerA.name] = (ns[playerA.name] || 0) + aScore;
        ns[playerB.name] = (ns[playerB.name] || 0) + bScore;
        setAllScores(ns);

        const nv = { ...allVerdicts };
        nv[playerA.name] = aVerdictMatch ? aVerdictMatch[1].trim() : 'SCORCHED';
        nv[playerB.name] = bVerdictMatch ? bVerdictMatch[1].trim() : 'BURNED';
        setAllVerdicts(nv);

        setJudgeResult({
          winner: w.name,
          aScore, bScore,
          aVerdict: aVerdictMatch ? aVerdictMatch[1].trim() : '',
          bVerdict: bVerdictMatch ? bVerdictMatch[1].trim() : '',
          summary: summaryMatch ? summaryMatch[1].trim() : cleanText(res)
        });
        setPhase('result');
      };

      const handleNeedAmmo = async () => {
        const attacker = phase === 'a_turn' ? playerA : playerB;
        const target = phase === 'a_turn' ? playerB : playerA;
        setShowAmmo(true); setAmmoText('LOADING AMMUNITION...');
        const res = await callAI(
          `Generate one devastating roast line for ${attacker?.name} to use against ${target?.name} who is described as "${target?.personality || 'mysterious'}". One line only. Make it brutally creative and specific. Do not hold back.`,
          [], "You write devastating roast one-liners."
        );
        setAmmoText(cleanText(res));
      };

      const nextBattle = () => {
        if (remaining.length === 0) { setPhase('finished'); return; }
        const challenger = remaining[0];
        setPlayerA(winner); setPlayerB(challenger);
        setRemaining(prev => prev.slice(1));
        setBattled(prev => { const s = new Set(prev); s.add(challenger.name); return s; });
        setTranscript([]); setRoundNum(1); setJudgeResult(null);
        setPhase('a_turn');
      };

      const finishGame = () => {
        const fp = players.map(p => ({
          ...p, score: String(allScores[p.name] || 0),
          verdict: allVerdicts[p.name] || 'UNSCATHED'
        }));
        onFinish(fp, 'ROAST BATTLE');
      };

      const currentAttacker = phase === 'a_turn' ? playerA : playerB;
      const currentTarget = phase === 'a_turn' ? playerB : playerA;

      return (
        <main className="bg-black text-white overflow-hidden h-screen w-screen relative" style={{cursor:'crosshair'}}>
          <SigintOverlays/><SigintHeader onExit={onLobby}/>
          <div className="relative grid grid-cols-2 h-full w-full pt-[52px]">
            {/* Player A side */}
            <section className={`relative overflow-hidden border-r border-white/20 flex items-start p-12 ${phase==='a_turn'?'bg-gradient-to-br from-[#FF003C]/15 to-transparent':'bg-gradient-to-br from-[#FF003C]/5 to-transparent'} transition-all`}>
              <div className="relative z-20"><h2 className="michroma text-5xl tracking-widest sigint-glitch uppercase mb-2">{playerA?.name}</h2><div className={`text-[10px] uppercase michroma ${phase==='a_turn'?'text-[#FF003C] animate-pulse':'text-white/40'}`}>{phase==='a_turn'?'YOUR TURN TO ROAST':'Waiting...'}</div>
                {judgeResult&&<div className="mt-4"><span className="michroma text-3xl text-[#C9A84C]">{judgeResult.aScore}/10</span><p className="text-sm text-white/60 mt-2">{judgeResult.aVerdict}</p></div>}
              </div>
            </section>
            {/* Player B side */}
            <section className={`relative overflow-hidden flex items-start justify-end p-12 text-right ${phase==='b_turn'?'bg-gradient-to-bl from-[#00E5FF]/15 to-transparent':'bg-gradient-to-bl from-[#00E5FF]/5 to-transparent'} transition-all`}>
              <div className="relative z-20"><h2 className="michroma text-5xl tracking-widest sigint-glitch uppercase mb-2">{playerB?.name}</h2><div className={`text-[10px] uppercase michroma ${phase==='b_turn'?'text-[#00E5FF] animate-pulse':'text-white/40'}`}>{phase==='b_turn'?'YOUR TURN TO ROAST':'Waiting...'}</div>
                {judgeResult&&<div className="mt-4"><span className="michroma text-3xl text-[#C9A84C]">{judgeResult.bScore}/10</span><p className="text-sm text-white/60 mt-2">{judgeResult.bVerdict}</p></div>}
              </div>
            </section>

            {/* Center content */}
            <div className="absolute inset-0 flex flex-col items-center justify-center z-30 pt-[52px] pointer-events-none">
              <div className="michroma text-[10px] text-white/40 tracking-widest mb-2">ROUND {roundNum} / {totalRounds}</div>
              {(phase==='a_turn'||phase==='b_turn')&&(
                <div className="text-center pointer-events-auto"><p className="michroma text-lg text-[#C9A84C] tracking-widest mb-2">{currentAttacker?.name} — ROAST {currentTarget?.name}</p><p className="text-sm text-white/40">TYPE YOUR ROAST BELOW</p></div>
              )}
              {phase==='judging'&&<div className="michroma text-2xl text-[#C9A84C] animate-pulse tracking-widest">AI IS JUDGING...</div>}
              {phase==='result'&&judgeResult&&(
                <div className="text-center pointer-events-auto">
                  <h3 className="michroma text-5xl text-[#C9A84C] sigint-glitch tracking-widest mb-4">{judgeResult.winner} WINS</h3>
                  <p className="text-lg text-white/60 mb-8 max-w-lg">{judgeResult.summary}</p>
                  <button onClick={remaining.length>0?nextBattle:finishGame} className="border border-[#C9A84C] px-8 py-3 michroma text-xs text-[#C9A84C] hover:bg-[#C9A84C] hover:text-black transition-all tracking-widest uppercase">{remaining.length>0?'NEXT CHALLENGER':'VIEW LEADERBOARD'}</button>
                </div>
              )}
              {phase==='finished'&&(
                <div className="text-center pointer-events-auto"><h3 className="michroma text-4xl text-[#C9A84C] sigint-glitch tracking-widest mb-8">ALL BATTLES COMPLETE</h3><button onClick={finishGame} className="border border-[#C9A84C] px-12 py-4 michroma text-sm text-[#C9A84C] hover:bg-[#C9A84C] hover:text-black transition-all tracking-widest uppercase">VIEW LEADERBOARD</button></div>
              )}

              {/* Transcript */}
              {transcript.length>0&&(phase==='a_turn'||phase==='b_turn')&&(
                <div className="mt-6 max-w-md w-full space-y-2 max-h-[200px] overflow-y-auto sigint-scroll pointer-events-auto">
                  {transcript.map((m,i)=>(<div key={i} className={`px-4 py-2 border ${m.from===playerA?.name?'border-[#FF003C]/30 text-[#FF003C]/80':'border-[#00E5FF]/30 text-[#00E5FF]/80'} text-sm`}><span className="font-bold text-xs">{m.from}:</span> {m.text}</div>))}
                </div>
              )}
            </div>
          </div>

          {/* Bottom input + ammo */}
          {(phase==='a_turn'||phase==='b_turn')&&(
            <div className="fixed bottom-0 left-0 w-full z-[55] px-6 pb-10 flex flex-col items-center gap-4">
              <div className="w-full max-w-2xl flex items-center gap-4 sigint-ghost-border px-4 py-3 bg-black/80">
                <span className="michroma text-[#C9A84C] text-xs">&gt;&gt;</span>
                <input autoFocus className="flex-grow bg-transparent border-none focus:ring-0 text-white text-sm tracking-wide placeholder:text-white/20 outline-none uppercase" placeholder={`${currentAttacker?.name}, TYPE YOUR ROAST...`} value={input} onChange={e=>setInput(e.target.value)} onKeyDown={handleSubmit}/>
              </div>
              <button onClick={handleNeedAmmo} className="px-12 py-3 border border-secondary/60 bg-black/80 hover:bg-secondary hover:text-black transition-all duration-300 group"><span className="michroma text-sm text-secondary group-hover:text-black tracking-[0.4em] uppercase">NEED AMMO?</span></button>
            </div>
          )}

          {showAmmo&&ammoText&&(
            <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/80 backdrop-blur-sm" onClick={()=>setShowAmmo(false)}><div className="max-w-lg p-8 border border-[#C9A84C]/40 bg-black/90"><div className="michroma text-[10px] text-[#C9A84C] tracking-widest mb-4">AMMUNITION_LOADED</div><p className="text-lg text-white leading-relaxed">{ammoText}</p><div className="mt-6 text-[10px] text-white/30 font-mono">TAP ANYWHERE TO DISMISS</div></div></div>
          )}
        </main>
      );
    }

    /* ═══════════════════════════════════════════════════════
       GAME 3 — TWO TRUTHS ONE LIE (AI mode + Friends mode)
    ═══════════════════════════════════════════════════════ */
    function TwoTruthsGame({ players, gameMode, onFinish, onLobby }) {
      // AI MODE (1 player)
      const [aiRound, setAiRound] = useState(1);
      const [aiPhase, setAiPhase] = useState('player_input'); // player_input, ai_guessing, ai_turn, player_guessing, ai_reveal
      const [playerStatements, setPlayerStatements] = useState(['','','']);
      const [playerLie, setPlayerLie] = useState(null);
      const [aiGuessText, setAiGuessText] = useState('');
      const [aiStatements, setAiStatements] = useState([]);
      const [aiLieIdx, setAiLieIdx] = useState(-1);
      const [playerGuess, setPlayerGuess] = useState(null);
      const [aiRevealText, setAiRevealText] = useState('');
      const [aiScore, setAiScore] = useState(0);
      const [playerScore, setPlayerScore] = useState(0);
      const [loading, setLoading] = useState(false);
      const totalAiRounds = 3;

      // FRIENDS MODE (2+ players)
      const [hotSeatIdx, setHotSeatIdx] = useState(0);
      const [friendStatements, setFriendStatements] = useState([]);
      const [friendLieIdx, setFriendLieIdx] = useState(-1);
      const [friendPhase, setFriendPhase] = useState('input'); // input, voting, reveal
      const [friendVotes, setFriendVotes] = useState({});
      const [friendVoterIdx, setFriendVoterIdx] = useState(0);
      const [friendScores, setFriendScores] = useState({});
      const [customStatements, setCustomStatements] = useState(['','','']);
      const [customLie, setCustomLie] = useState(null);

      const isAI = gameMode === 'ai';
      const hotSeatPlayer = isAI ? players[0] : players[hotSeatIdx];
      const voters = isAI ? [] : players.filter((_,i) => i !== hotSeatIdx);

      // === AI MODE ===
      const submitPlayerStatements = async () => {
        if (!playerStatements.every(s=>s.trim()) || playerLie === null) return;
        setLoading(true); setAiPhase('ai_guessing');
        const stmts = playerStatements.map((s,i)=>`Statement ${i+1}: ${s}`).join('\n');
        const res = await callAI(`A player named ${players[0]?.name} submitted 3 statements. Two are truths, one is a lie:\n${stmts}\nDramatically analyze all 3, guess which is the lie with full theatrical reasoning, and give a confidence score out of 100.`, [], "You are a sharp lie detector AI. Be dramatic in your analysis.");
        setAiGuessText(cleanText(res));
        // Check if AI got it right
        const guessMatch = res.match(/statement\s*(\d)/i);
        const aiGuessed = guessMatch ? parseInt(guessMatch[1]) - 1 : -1;
        if (aiGuessed !== playerLie) setPlayerScore(prev => prev + 1);
        else setAiScore(prev => prev + 1);
        setLoading(false);
      };

      const goToAiTurn = async () => {
        setLoading(true); setAiPhase('ai_turn');
        const res = await callAI("Generate 2 believable truths and 1 convincing lie about any topic, fictional scenario, or general knowledge. Format EXACTLY as: STATEMENT_1: [text] STATEMENT_2: [text] STATEMENT_3: [text] LIE: [1 or 2 or 3]", [], "You generate two truths and one lie. Make the lie very plausible.");
        const s1=res.match(/STATEMENT_1:\s*(.+?)(?=STATEMENT_2:|$)/is);
        const s2=res.match(/STATEMENT_2:\s*(.+?)(?=STATEMENT_3:|$)/is);
        const s3=res.match(/STATEMENT_3:\s*(.+?)(?=LIE:|$)/is);
        const lie=res.match(/LIE:\s*(\d)/i);
        setAiStatements([s1?s1[1].trim():'S1',s2?s2[1].trim():'S2',s3?s3[1].trim():'S3']);
        setAiLieIdx(lie?parseInt(lie[1])-1:2);
        setLoading(false);
        setAiPhase('player_guessing');
      };

      const handlePlayerGuessAI = (idx) => {
        setPlayerGuess(idx);
        if (idx === aiLieIdx) setPlayerScore(prev => prev + 1);
        else setAiScore(prev => prev + 1);
        setAiPhase('ai_reveal');
        setAiRevealText(idx === aiLieIdx ? 'You got it right! Well played.' : `Wrong! The lie was Statement ${aiLieIdx + 1}.`);
      };

      const nextAiRound = () => {
        if (aiRound >= totalAiRounds) {
          const fp = players.map(p => ({ ...p, score: String(playerScore * 10 + 30) }));
          onFinish(fp, 'TWO TRUTHS ONE LIE');
        } else {
          setAiRound(prev => prev + 1);
          setAiPhase('player_input');
          setPlayerStatements(['','','']);
          setPlayerLie(null);
          setAiGuessText('');
          setAiStatements([]);
          setPlayerGuess(null);
        }
      };

      // === FRIENDS MODE ===
      const submitFriendStatements = () => {
        if (!customStatements.every(s=>s.trim()) || customLie === null) return;
        setFriendStatements(customStatements.map(s=>s.trim()));
        setFriendLieIdx(customLie);
        setFriendPhase('voting');
        setFriendVotes({}); setFriendVoterIdx(0);
      };

      const handleFriendVote = (stIdx) => {
        const voter = voters[friendVoterIdx];
        const nv = {...friendVotes, [voter.name]: stIdx};
        setFriendVotes(nv);
        if (friendVoterIdx < voters.length - 1) { setFriendVoterIdx(prev=>prev+1); }
        else {
          const ns = {...friendScores};
          Object.entries(nv).forEach(([name, guess]) => { if (guess === friendLieIdx) ns[name] = (ns[name]||0) + 10; });
          setFriendScores(ns);
          setFriendPhase('reveal');
        }
      };

      const nextFriendPlayer = () => {
        if (hotSeatIdx < players.length - 1) {
          setHotSeatIdx(prev => prev + 1);
          setFriendPhase('input');
          setCustomStatements(['','','']);
          setCustomLie(null);
        } else {
          const fp = players.map(p => ({ ...p, score: String(friendScores[p.name] || 0) }));
          onFinish(fp, 'TWO TRUTHS ONE LIE');
        }
      };

      // === RENDER ===
      return (
        <main className="bg-black text-white h-screen w-screen relative overflow-hidden flex flex-col" style={{cursor:'crosshair'}}>
          <SigintOverlays/><SigintHeader onExit={onLobby}/>
          <div className="flex-1 flex flex-col items-center justify-center px-8 pt-[76px] pb-8 relative z-10 overflow-y-auto sigint-scroll">

            {isAI ? (<>
              {/* AI MODE */}
              <h2 className="michroma text-4xl sigint-glitch text-white tracking-widest mb-2 uppercase">{players[0]?.name}</h2>
              <div className="michroma text-[10px] text-[#C9A84C] tracking-widest mb-6">ROUND {aiRound} / {totalAiRounds} — SCORES: YOU {playerScore} | AI {aiScore}</div>

              {aiPhase==='player_input'&&(
                <div className="w-full max-w-xl space-y-4">
                  <p className="michroma text-sm text-white/40 tracking-widest mb-4 text-center">ENTER YOUR 3 STATEMENTS (2 TRUTHS, 1 LIE)</p>
                  {[0,1,2].map(i=>(<div key={i} className="flex items-center gap-4"><span className="michroma text-lg text-[#C9A84C]">{i+1}</span><input className="flex-1 bg-transparent border border-white/20 px-4 py-3 text-sm focus:ring-0 focus:border-white/60 outline-none" placeholder={`Statement ${i+1}...`} value={playerStatements[i]} onChange={e=>{const ns=[...playerStatements];ns[i]=e.target.value;setPlayerStatements(ns);}}/></div>))}
                  <div className="text-center mt-4"><p className="michroma text-[10px] text-white/40 mb-4 tracking-widest">WHICH IS YOUR LIE?</p><div className="flex gap-4 justify-center">{[0,1,2].map(i=>(<button key={i} onClick={()=>setPlayerLie(i)} className={`w-12 h-12 border ${playerLie===i?'border-[#FF003C] bg-[#FF003C]/20 text-[#FF003C]':'border-white/20 text-white/60'} michroma text-lg`}>{i+1}</button>))}</div>
                  <button onClick={submitPlayerStatements} className="mt-6 border border-[#C9A84C] px-8 py-3 michroma text-xs text-[#C9A84C] hover:bg-[#C9A84C] hover:text-black transition-all tracking-widest">SUBMIT</button></div>
                </div>
              )}

              {aiPhase==='ai_guessing'&&(<div className="max-w-2xl text-center">
                {loading?<div className="michroma text-xl text-[#C9A84C] animate-pulse tracking-widest">AI IS ANALYZING...</div>:<><p className="text-lg text-white/80 leading-relaxed mb-8">{aiGuessText}</p><button onClick={goToAiTurn} className="border border-[#C9A84C] px-8 py-3 michroma text-xs text-[#C9A84C] hover:bg-[#C9A84C] hover:text-black transition-all tracking-widest">NOW AI'S TURN</button></>}
              </div>)}

              {aiPhase==='player_guessing'&&(<div className="text-center max-w-3xl">
                {loading?<div className="michroma text-xl text-[#C9A84C] animate-pulse tracking-widest">AI IS GENERATING...</div>:(<>
                <p className="michroma text-sm text-white/40 tracking-widest mb-8">AI'S STATEMENTS — WHICH IS THE LIE?</p>
                <div className="space-y-4">{aiStatements.map((s,i)=>(<button key={i} onClick={()=>handlePlayerGuessAI(i)} className="w-full border border-white/20 bg-black p-6 text-left hover:border-[#C9A84C] hover:bg-white/5 transition-all flex items-center gap-4"><span className="michroma text-xl text-[#C9A84C]">{i+1}</span><span className="text-lg text-white">{s}</span></button>))}</div>
                </>)}
              </div>)}

              {aiPhase==='ai_reveal'&&(<div className="text-center max-w-3xl">
                <h3 className="michroma text-2xl sigint-glitch tracking-widest mb-4">THE LIE WAS STATEMENT {aiLieIdx+1}</h3>
                <div className="space-y-4 mb-8">{aiStatements.map((s,i)=>(<div key={i} className={`p-4 border ${i===aiLieIdx?'border-[#FF003C] bg-[#FF003C]/10':'border-green-500/30 bg-green-500/5'} flex items-center gap-4`}><span className={`michroma text-lg ${i===aiLieIdx?'text-[#FF003C]':'text-green-400'}`}>{i===aiLieIdx?'✕':'✓'}</span><span className="text-white">{s}</span></div>))}</div>
                <p className="text-lg text-white/60 mb-8">{playerGuess===aiLieIdx?'You got it right!':'Wrong guess!'}</p>
                <button onClick={nextAiRound} className="border border-[#C9A84C] px-8 py-3 michroma text-xs text-[#C9A84C] hover:bg-[#C9A84C] hover:text-black transition-all tracking-widest uppercase">{aiRound>=totalAiRounds?'VIEW LEADERBOARD':'NEXT ROUND'}</button>
              </div>)}
            </>) : (<>
              {/* FRIENDS MODE */}
              <h2 className="michroma text-5xl sigint-glitch text-white tracking-widest mb-2 uppercase">{hotSeatPlayer?.name}</h2>
              <div className="michroma text-[10px] text-[#C9A84C] tracking-widest mb-8">HOT SEAT — PLAYER {hotSeatIdx+1} OF {players.length}</div>

              {friendPhase==='input'&&(
                <div className="w-full max-w-xl space-y-4">
                  <p className="michroma text-sm text-white/40 tracking-widest mb-4 text-center">{hotSeatPlayer?.name}, ENTER 3 STATEMENTS (2 TRUTHS, 1 LIE)</p>
                  {[0,1,2].map(i=>(<div key={i} className="flex items-center gap-4"><span className="michroma text-lg text-[#C9A84C]">{i+1}</span><input className="flex-1 bg-transparent border border-white/20 px-4 py-3 text-sm focus:ring-0 focus:border-white/60 outline-none" placeholder={`Statement ${i+1}...`} value={customStatements[i]} onChange={e=>{const ns=[...customStatements];ns[i]=e.target.value;setCustomStatements(ns);}}/></div>))}
                  <div className="text-center mt-4"><p className="michroma text-[10px] text-white/40 mb-4 tracking-widest">WHICH IS THE LIE?</p><div className="flex gap-4 justify-center">{[0,1,2].map(i=>(<button key={i} onClick={()=>setCustomLie(i)} className={`w-12 h-12 border ${customLie===i?'border-[#FF003C] bg-[#FF003C]/20 text-[#FF003C]':'border-white/20 text-white/60'} michroma text-lg`}>{i+1}</button>))}</div>
                  <button onClick={submitFriendStatements} className="mt-6 border border-[#C9A84C] px-8 py-3 michroma text-xs text-[#C9A84C] hover:bg-[#C9A84C] hover:text-black transition-all tracking-widest">SUBMIT</button></div>
                </div>
              )}

              {friendPhase==='voting'&&(<div className="text-center max-w-3xl">
                <p className="michroma text-sm text-white/40 tracking-widest mb-4">{voters[friendVoterIdx]?.name} — WHICH IS THE LIE?</p>
                <div className="space-y-4">{friendStatements.map((s,i)=>(<button key={i} onClick={()=>handleFriendVote(i)} className="w-full border border-white/20 bg-black p-6 text-left hover:border-[#C9A84C] hover:bg-white/5 transition-all flex items-center gap-4"><span className="michroma text-xl text-[#C9A84C]">{i+1}</span><span className="text-lg text-white">{s}</span></button>))}</div>
              </div>)}

              {friendPhase==='reveal'&&(<div className="text-center max-w-3xl">
                <h3 className="michroma text-2xl sigint-glitch tracking-widest mb-8">THE LIE WAS STATEMENT {friendLieIdx+1}</h3>
                <div className="space-y-4 mb-8">{friendStatements.map((s,i)=>(<div key={i} className={`p-4 border ${i===friendLieIdx?'border-[#FF003C] bg-[#FF003C]/10':'border-green-500/30 bg-green-500/5'} flex items-center gap-4`}><span className={`michroma text-lg ${i===friendLieIdx?'text-[#FF003C]':'text-green-400'}`}>{i===friendLieIdx?'✕':'✓'}</span><span className="text-white">{s}</span></div>))}</div>
                <div className="flex flex-wrap gap-3 justify-center mb-8">{Object.entries(friendVotes).map(([name,guess])=>(<span key={name} className={`px-3 py-1 border text-xs michroma ${guess===friendLieIdx?'border-green-500 text-green-400':'border-[#FF003C] text-[#FF003C]'}`}>{name}: {guess===friendLieIdx?'CORRECT':'WRONG'}</span>))}</div>
                <button onClick={nextFriendPlayer} className="border border-[#C9A84C] px-8 py-3 michroma text-xs text-[#C9A84C] hover:bg-[#C9A84C] hover:text-black transition-all tracking-widest uppercase">{hotSeatIdx<players.length-1?'NEXT PLAYER':'VIEW LEADERBOARD'}</button>
              </div>)}
            </>)}
          </div>
        </main>
      );
    }

    /* ═══ GAMES 4-10: Keep existing implementations ═══ */
    /* Game 4 — Chaos Story, Game 5 — Purity Score, Game 6 — Never Have I Ever,
       Game 7 — Personality Roast, Game 8 — Guess Person, Game 9 — Who In Group,
       Game 10 — Reality Show — all imported from previous version */

      const [players, setPlayers] = useState([]);
      const [gameOptions, setGameOptions] = useState({});
      const [leaderboardData, setLeaderboardData] = useState({ players: [], gameName: '' });
      
      const triggerTransition = (nextScreen) => {
        setFlash(true);
        setTimeout(() => { setCurrentScreen(nextScreen); setTimeout(() => setFlash(false), 200); }, 200);
      };

      // FIX 1 — handleLobby: no triggerTransition, just reset
      const handleLobby = () => {
        setCurrentGameId(null);
        setPlayerName('');
        setGameMode(null);
        setConversationHistory([]);
        setRoundNumber(1);
        setVerdictData({ verdict: "", score: "0", summary: "" });
        setPlayers([]);
        setCurrentScreen('select');
      };

      const handleGameSelect = (gameId, mode) => {
        setCurrentGameId(gameId);
        setGameMode(mode);
        setConversationHistory([]);
        setRoundNumber(1);
        setPlayers([]);
        triggerTransition('playerSetup');
      };

      const handlePlayersReady = (playerList, options) => {
        setPlayers(playerList);
        setPlayerName(playerList[0]?.name || '');
        setGameOptions(options || {});
        setConversationHistory([]);
        setRoundNumber(1);
        const screens = { 1:'game_wyr', 2:'game_roast', 3:'game_truths', 4:'game_chaos', 5:'game_purity', 6:'game_nhie', 7:'game_personality', 8:'game_guess', 9:'game_who', 10:'game_reality' };
        triggerTransition(screens[currentGameId] || 'game_wyr');
      };

      const handleGameFinish = (finalPlayers, gameName) => {
        setLeaderboardData({ players: finalPlayers, gameName: gameName });
        setPlayers(finalPlayers);
        triggerTransition('leaderboard');
      };

      // For original gameplay/results flow (fallback)
      const handleOldFinish = (verdict, score, summary) => {
        const gm = GAMES.find(g => g.id === currentGameId);
        setVerdictData({ verdict, score, summary, gameName: gm?.title || '', playerName });
        triggerTransition('results');
      };

      const handlePlayAgain = () => {
        setConversationHistory([]); setRoundNumber(1);
        setVerdictData({ verdict: "", score: "0", summary: "" });
        triggerTransition('playerSetup');
      };

      const handleMainMenu = () => {
        setCurrentGameId(null); setPlayerName(''); setGameMode(null);
        setPlayers([]); setConversationHistory([]); setRoundNumber(1);
        triggerTransition('select');
      };

      const cursorRef = useRef(null);

      useEffect(() => {
        const handleMouseMove = (e) => {
           if(cursorRef.current) {
              cursorRef.current.style.left = e.clientX + 'px';
              cursorRef.current.style.top = e.clientY + 'px';
           }
        };
        const handleMouseOver = (e) => {
           const isInteractive = e.target.closest('button, a, .group, .game-row');
           if(isInteractive && cursorRef.current) {
              cursorRef.current.style.transform = 'scale(4)';
              cursorRef.current.style.backgroundColor = 'transparent';
              cursorRef.current.style.border = '1px solid #c1fffe';
              cursorRef.current.style.boxShadow = 'none';
           } else if(cursorRef.current) {
              cursorRef.current.style.transform = 'scale(1)';
              cursorRef.current.style.backgroundColor = '#00fd00';
              cursorRef.current.style.border = 'none';
              cursorRef.current.style.boxShadow = '0 0 15px #00fd00';
           }
        };

        const sigintScreens = ['playerSetup', 'leaderboard', 'game_wyr', 'game_roast', 'game_truths', 'game_chaos', 'game_purity', 'game_nhie', 'game_personality', 'game_guess', 'game_who', 'game_reality'];
        if (sigintScreens.includes(currentScreen)) {
           document.body.style.cursor = 'crosshair';
        } else if (currentScreen === 'results') {
           document.body.style.cursor = 'crosshair';
        } else {
           document.body.style.cursor = 'none';
           document.addEventListener('mousemove', handleMouseMove);
           document.addEventListener('mouseover', handleMouseOver);
        }

        return () => {
          document.removeEventListener('mousemove', handleMouseMove);
          document.removeEventListener('mouseover', handleMouseOver);
        };
      }, [currentScreen]);

      const sigintScreens = ['playerSetup', 'leaderboard', 'results', 'game_wyr', 'game_roast', 'game_truths', 'game_chaos', 'game_purity', 'game_nhie', 'game_personality', 'game_guess', 'game_who', 'game_reality'];
      const showCustomCursor = !sigintScreens.includes(currentScreen);

      return (
        <div className="relative w-full h-full text-on-background">
          <div className="grain-overlay"></div>
          {showCustomCursor && <div className="custom-cursor" ref={cursorRef}></div>}
          
          {flash && (<div className="fixed inset-0 z-[99999] pointer-events-none animate-flash"></div>)}

          {currentScreen === 'hero' && <Hero onStart={() => triggerTransition('select')} />}
          {currentScreen === 'select' && <GameSelect onSelectGame={handleGameSelect} />}
          {currentScreen === 'playerSetup' && <PlayerSetup gameId={currentGameId} gameMode={gameMode} onStart={handlePlayersReady} onBack={() => triggerTransition('select')} />}
          
          {currentScreen === 'game_wyr' && <WouldYouRatherGame players={players} onFinish={handleGameFinish} onLobby={handleLobby} />}
          {currentScreen === 'game_roast' && <RoastBattleGame players={players} onFinish={handleGameFinish} onLobby={handleLobby} />}
          {currentScreen === 'game_truths' && <TwoTruthsGame players={players} gameMode={gameMode} onFinish={handleGameFinish} onLobby={handleLobby} />}
          {currentScreen === 'game_chaos' && <ChaosStoryGame players={players} onFinish={handleGameFinish} onLobby={handleLobby} />}
          {currentScreen === 'game_purity' && <PurityScoreGame players={players} onFinish={handleGameFinish} onLobby={handleLobby} />}
          {currentScreen === 'game_nhie' && <NeverHaveIEverGame players={players} onFinish={handleGameFinish} onLobby={handleLobby} />}
          {currentScreen === 'game_personality' && <PersonalityRoastGame players={players} onFinish={handleGameFinish} onLobby={handleLobby} />}
          {currentScreen === 'game_guess' && <GuessPersonGame players={players} onFinish={handleGameFinish} onLobby={handleLobby} />}
          {currentScreen === 'game_who' && <WhoInGroupGame players={players} onFinish={handleGameFinish} onLobby={handleLobby} />}
          {currentScreen === 'game_reality' && <RealityShowGame players={players} gameOptions={gameOptions} onFinish={handleGameFinish} onLobby={handleLobby} />}
          
          {currentScreen === 'leaderboard' && <Leaderboard rankedPlayers={leaderboardData.players} gameName={leaderboardData.gameName} onPlayAgain={handlePlayAgain} onMainMenu={handleMainMenu} />}
          {currentScreen === 'results' && <Results verdictData={verdictData} onLobby={handleLobby} onPlayAgain={handlePlayAgain} />}
        </div>
      );
    }
    
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
